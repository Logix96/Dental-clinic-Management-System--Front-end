<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - Phòng khám Nha khoa</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow mb-5">
                    <div class="card-body">
                        <h3 class="text-center mb-4">Đăng Ký Tài Khoản Bệnh Nhân</h3>
                        <form method="POST" action="/register">
                            
                            <h5 class="mb-3 text-primary">Thông tin cá nhân</h5>
                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">CCCD / CMND</label>
                                    <input type="text" name="patient_pin" class="form-control" maxlength="12" required>
                                </div>
                                <div class="col">
                                    <label class="form-label">Họ và Tên</label>
                                    <input type="text" name="name" class="form-control" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Giới tính</label>
                                    <select name="gender" class="form-select" required>
                                        <option value="M">Nam (M)</option>
                                        <option value="F">Nữ (F)</option>
                                    </select>
                                </div>
                                <div class="col">
                                    <label class="form-label">Ngày sinh</label>
                                    <input type="date" name="date_of_birth" class="form-control" required>
                                </div>
                            </div>

                            <div class="row mb-3">
                                <div class="col">
                                    <label class="form-label">Số điện thoại</label>
                                    <input type="text" name="phone" class="form-control" required>
                                </div>
                                <div class="col">
                                    <label class="form-label">Email</label>
                                    <input type="email" name="email" class="form-control" required>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Địa chỉ</label>
                                <input type="text" name="address" class="form-control" required>
                            </div>

                            <h5 class="mb-3 text-primary">Thông tin tài khoản</h5>
                            <div class="mb-3">
                                <label class="form-label">Tên đăng nhập</label>
                                <input type="text" name="username" class="form-control" required>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">Mật khẩu</label>
                                <input type="password" name="password" class="form-control" required>
                            </div>

                            <button type="submit" class="btn btn-success w-100 mb-3">Hoàn tất đăng ký</button>
                            <div class="text-center">
                                Đã có tài khoản? <a href="/login">Đăng nhập ngay</a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
