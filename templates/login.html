
<!doctype html>
<!-- khoi phuc thanh cong -->
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Nhập Hệ Thống - Nha Khoa Việt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <link rel="stylesheet" href="/static/css/login.css" />
  </head>
  <body>
    <nav class="main-navbar">
      <div class="container">
        <div class="d-flex align-items-center justify-content-between">
          <a href="/" class="navbar-brand d-flex align-items-center gap-2 text-decoration-none">
            <svg class="logo-icon" width="52" height="52" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
              <circle cx="26" cy="26" r="26" fill="#e8f3fc" />
              <path d="M26 10 C18 10 12 16 12 24 C12 32 18 38 26 42 C34 38 40 32 40 24 C40 16 34 10 26 10Z" fill="none" stroke="#1a6fa8" stroke-width="2.2" />
              <path d="M20 28 Q23 22 26 28 Q29 34 32 28" stroke="#1a6fa8" stroke-width="2" fill="none" stroke-linecap="round" />
              <path d="M22 18 Q26 14 30 18" stroke="#e05c2a" stroke-width="2" fill="none" stroke-linecap="round" />
            </svg>
            <div><div style="font-weight: 800; font-size: 1.15rem; color: var(--primary); letter-spacing: 1px; line-height: 1.1;">VD</div><div style="font-size: 0.68rem; color: var(--text-muted); font-weight: 500;">NHA KHOA VIỆT</div></div>
          </a>
          <a href="/" style="font-size: 0.88rem; color: var(--text-muted); text-decoration: none; display: flex; align-items: center; gap: 6px;"><i class="fas fa-arrow-left" style="font-size: 0.8rem"></i> Về trang chủ</a>
        </div>
      </div>
    </nav>

    <div class="login-wrapper">
      <div class="login-card">
        <div class="login-title">ĐĂNG NHẬP</div>
        
        {% if error %}
        <div class="alert-box alert-error">
          <i class="fas fa-exclamation-circle alert-icon"></i>
          <span>{{ error }}</span>
        </div>
        {% endif %}

        <form method="POST" action="/login">
          <div class="mb-3">
        <form method="POST" action="/login">
          <div class="mb-3">
            <label class="form-label">Tên đăng nhập</label>
            <div class="input-icon-wrap">
              <i class="fas fa-user input-icon"></i>
              <input type="text" name="username" class="form-control" placeholder="Nhập tên đăng nhập" required />
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Mật khẩu</label>
            <div class="input-icon-wrap">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required />
            </div>
          </div>

          <div class="d-flex justify-content-between align-items-center mb-3" style="font-size: 0.85rem">
            <label style="display: flex; align-items: center; gap: 6px; cursor: pointer; color: var(--text-muted);">
              <input type="checkbox" style="accent-color: var(--primary)" /> Ghi nhớ đăng nhập
            </label>
            <a href="/forgot-password" style="color: var(--primary); text-decoration: none; font-weight: 600;">Quên mật khẩu?</a>
          </div>

          <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt me-2"></i> Đăng nhập</button>
        </form>

        <div class="divider">hoặc</div>
        <div class="register-link">Chưa có tài khoản? <a href="/register">Đăng ký tại đây</a></div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
