<!DOCTYPE html>
<!-- khoi phuc thanh cong-->
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Thành Viên - Nha Khoa Việt</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/register.css') }}">
</head>
<body>

    <nav class="main-navbar">
        <div class="container">
            <div class="d-flex align-items-center justify-content-between">
                <a href="/" class="navbar-brand d-flex align-items-center gap-2 text-decoration-none">
                    <svg class="logo-icon" viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="26" cy="26" r="26" fill="#e8f3fc"/>
                        <path d="M26 10 C18 10 12 16 12 24 C12 32 18 38 26 42 C34 38 40 32 40 24 C40 16 34 10 26 10Z" fill="none" stroke="#1a6fa8" stroke-width="2.2"/>
                        <path d="M20 28 Q23 22 26 28 Q29 34 32 28" stroke="#1a6fa8" stroke-width="2" fill="none" stroke-linecap="round"/>
                        <path d="M22 18 Q26 14 30 18" stroke="#e05c2a" stroke-width="2" fill="none" stroke-linecap="round"/>
                    </svg>
                    <div>
                        <div style="font-weight:800;font-size:1.15rem;color:var(--primary);letter-spacing:1px;line-height:1.1">VD</div>
                        <div style="font-size:0.68rem;color:var(--text-muted);font-weight:500">NHA KHOA VIỆT</div>
                    </div>
                </a>
                <a href="/" style="font-size:0.88rem;color:var(--text-muted);text-decoration:none;display:flex;align-items:center;gap:6px;">
                    <i class="fas fa-arrow-left" style="font-size:0.8rem;"></i> Về trang chủ
                </a>
            </div>
        </div>
    </nav>

    <div class="register-wrapper">
        <div class="register-card">
            <div class="register-title">Tạo Tài Khoản Mới</div>

            <form method="POST" action="{{ url_for('auth.register') }}"> 
                <div class="section-heading"><i class="fas fa-address-card"></i> Thông tin cá nhân</div>
                
                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">CCCD / CMND *</label>
                        <input type="text" name="client_pin" class="form-control" placeholder="Nhập 12 số CCCD" maxlength="12" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Họ và Tên *</label>
                        <input type="text" name="name" class="form-control" placeholder="Nhập họ và tên" required>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Giới tính *</label>
                        <select name="gender" class="form-select" required>
                            <option value="" disabled selected>Chọn giới tính...</option>
                            <option value="M">Nam</option>
                            <option value="F">Nữ</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Ngày sinh *</label>
                        <input type="date" name="date_of_birth" class="form-control" required>
                    </div>
                </div>

                <div class="row g-3 mb-3">
                    <div class="col-md-6">
                        <label class="form-label">Số điện thoại *</label>
                        <input type="tel" name="phone" class="form-control" placeholder="Nhập số điện thoại" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Email *</label>
                        <input type="email" name="email" class="form-control" placeholder="Nhập địa chỉ email" required>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Địa chỉ cư trú *</label>
                    <input type="text" name="address" class="form-control" placeholder="Số nhà, tên đường, quận/huyện..." required>
                </div>

                <div class="section-heading mt-4"><i class="fas fa-user-shield"></i> Thông tin đăng nhập</div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label">Tên đăng nhập *</label>
                        <input type="text" name="username" class="form-control" placeholder="Tạo tên đăng nhập" required>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label">Mật khẩu *</label>
                        <input type="password" name="password" class="form-control" placeholder="Tạo mật khẩu" required>
                    </div>
                </div>

                <button type="submit" class="btn-register"><i class="fas fa-user-plus me-2"></i> Hoàn tất đăng ký</button>

                <div class="divider">hoặc</div>
                <div class="login-link">Đã có tài khoản? <a href="{{ url_for('auth.login') }}">Đăng nhập tại đây</a></div>
            </form>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
